name: Expense Tracker CI/CD
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Login to Google Cloud
      - id: 'auth'
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Build the Docker image (This handles Java + React together)
      - name: Build and Push
        run: |
          gcloud auth configure-docker
          docker build -t gcr.io/kishorsurya2011-org/expense-app:latest .
          docker push gcr.io/kishorsurya2011-org/expense-app:latest

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy expense-tracker \
            --image gcr.io/kishorsurya2011-org/expense-app:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances kishorsurya2011-org:us-central1:expense-db-instance
